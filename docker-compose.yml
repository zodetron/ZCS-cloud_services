version: '3.9'

# docker-compose automatically reads .env from this directory.
# All ${VAR} references below are resolved from the root .env file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: storagecloud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-storagecloud}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: storagecloud-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    container_name: storagecloud-app
    ports:
      - '3000:80'
    env_file: .env
    environment:
      REDIS_HOST: redis
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
